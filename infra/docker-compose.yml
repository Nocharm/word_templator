name: word-templator

services:
  backend:
    build:
      context: ../backend
    env_file: ../.env
    volumes:
      - filedata:/data
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    restart: unless-stopped

  frontend:
    # env_file 미사용 — 백엔드 시크릿(JWT_SECRET 등) 이 프론트 컨테이너 env 로 새지 않게.
    # 필요한 변수만 명시 주입하고, NEXT_PUBLIC_* 는 빌드 ARG 로 전달해 JS 번들에 인라인.
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    environment:
      INTERNAL_API_BASE: http://backend:8000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  filedata:
